<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocal Ping-Pong - Multi-appareils</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaLj-265kyKSuMSzm34RpKqPw7NX8tuVw",
            authDomain: "vocal-ping-pong.firebaseapp.com",
            projectId: "vocal-ping-pong",
            storageBucket: "vocal-ping-pong.firebasestorage.app",
            messagingSenderId: "1073422582999",
            appId: "1:1073422582999:web:822acd6a8a1bffa10c5c92",
            measurementId: "G-R9XNF09NZ0"
        };

        const appId = "vocal-ping-pong"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let role = new URLSearchParams(window.location.search).get('role') || 'host';
        let remoteVolumes = { blue: 0, red: 0 };
        let localVolume = 0;
        let controlMode = 'remote'; 
        let unsubscribeListeners = [];

        const initAuth = async () => {
            onAuthStateChanged(auth, (user) => {
                if (user) startApp();
                else signInAnonymously(auth);
            });
        };

        // --- LOGIQUE MANETTE (ULTRA-RÉACTIVE) ---
        const initController = async (team) => {
            const statusText = document.getElementById('controller-status');
            const volumeBar = document.getElementById('volume-bar');
            const localSensRange = document.getElementById('local-sens-range');
            const localSensValue = document.getElementById('local-sens-value');
            const startBtn = document.getElementById('start-mic-btn');
            const networkDot = document.getElementById('network-dot');
            
            let localSensMultiplier = 1.5;
            let smoothedVolume = 0;
            let lastSentValue = -1;

            localSensRange.addEventListener('input', (e) => {
                localSensMultiplier = parseFloat(e.target.value);
                localSensValue.innerText = localSensMultiplier.toFixed(1);
            });

            startBtn.addEventListener('click', async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioContext.state === 'suspended') await audioContext.resume();

                    const source = audioContext.createMediaStreamSource(stream);
                    const analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256; 
                    source.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    startBtn.classList.add('hidden');
                    statusText.innerText = `Équipe ${team === 'blue' ? 'Bleue' : 'Rouge'} ACTIVE`;
                    statusText.className = "text-green-400 font-bold text-sm bg-slate-900 px-6 py-2 rounded-full border border-green-500/20";
                    networkDot.classList.remove('bg-red-500');
                    networkDot.classList.add('bg-green-500', 'animate-pulse');

                    // Boucle 60ms : Idéal pour Firestore sans saturation
                    setInterval(async () => {
                        if (!auth.currentUser) return;
                        
                        analyser.getByteTimeDomainData(dataArray);
                        let sumSquares = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            let normalized = (dataArray[i] - 128) / 128;
                            sumSquares += normalized * normalized;
                        }
                        let currentRMS = Math.sqrt(sumSquares / dataArray.length);
                        
                        // Calcul réactif
                        let rawVolume = currentRMS * localSensMultiplier * 25; 
                        if (rawVolume < 0.02) rawVolume = 0;
                        
                        // Lissage léger pour garder la réactivité
                        smoothedVolume = (smoothedVolume * 0.2) + (rawVolume * 0.8);
                        const finalVolume = Math.min(smoothedVolume, 3.0);
                        
                        // Optimisation : On n'envoie que si le volume change significativement
                        if (Math.abs(finalVolume - lastSentValue) > 0.01 || finalVolume === 0) {
                            try {
                                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'paddle_volumes', team);
                                await setDoc(docRef, { volume: finalVolume, t: Date.now() }, { merge: true });
                                lastSentValue = finalVolume;
                            } catch (e) {}
                        }
                        
                        volumeBar.style.height = Math.min(finalVolume * 33, 100) + '%';
                    }, 60);

                } catch (err) {
                    statusText.innerText = "Autorisez le micro !";
                }
            });
        };

        // --- LOGIQUE HÔTE ---
        const initHost = () => {
            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            const scoreLeftEl = document.getElementById('score-left');
            const scoreRightEl = document.getElementById('score-right');
            const sensitivityRange = document.getElementById('sensitivity-range');
            const sensitivityValue = document.getElementById('sensitivity-value');
            const overlay = document.getElementById('overlay');
            const nextRoundBtn = document.getElementById('next-round-btn');
            const qrSection = document.getElementById('qr-section');
            const modeToggle = document.getElementById('mode-toggle');
            const localVolBar = document.getElementById('local-vocal-bar');
            const controlGrid = document.getElementById('control-grid');

            const config = {
                paddleWidth: 15, paddleHeight: 100, ballSize: 10,
                gravity: 0.8, liftPower: 1.2,
                ballBaseSpeed: 1.25, ballAcceleration: 1.02,
                colorLeft: '#3b82f6', colorRight: '#ef4444'
            };

            let score = { left: 0, right: 0 };
            let ball = { x: 0, y: 0, vx: 0, vy: 0 };
            let paddleL = { y: 0, vy: 0 };
            let paddleR = { y: 0, vy: 0 };
            let isRunning = false;
            let keys = {};
            let hostAnalyser = null;
            let hostDataArray = null;

            const resize = () => {
                canvas.width = Math.min(window.innerWidth * 0.9, 800);
                canvas.height = Math.max(380, Math.min(window.innerHeight * 0.45, 450));
                resetPositions();
            };

            const resetPositions = () => {
                ball.x = canvas.width / 2; ball.y = canvas.height / 2;
                ball.vx = ball.vy = 0;
                paddleL.y = paddleR.y = canvas.height / 2 - config.paddleHeight / 2;
                paddleL.vy = paddleR.vy = 0;
            };

            const setupListeners = () => {
                if (!auth.currentUser) return;
                unsubscribeListeners.forEach(unsub => unsub());
                unsubscribeListeners = [];
                ['blue', 'red'].forEach(team => {
                    const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'paddle_volumes', team), (d) => { 
                        if(d.exists()) remoteVolumes[team] = d.data().volume; 
                    }, (err) => console.warn(err));
                    unsubscribeListeners.push(unsub);
                });
            };

            function update() {
                if (controlMode === 'local' && hostAnalyser) {
                    hostAnalyser.getByteTimeDomainData(hostDataArray);
                    let s = 0; for(let i=0; i<hostDataArray.length; i++) { let v=(hostDataArray[i]-128)/128; s+=v*v; }
                    localVolume = Math.sqrt(s/hostDataArray.length)*15;
                    localVolBar.style.width = Math.min(localVolume * 50, 100) + '%';
                }

                const isBallLeft = ball.x < canvas.width / 2;
                let liftL = 0, liftR = 0;
                if (controlMode === 'remote') {
                    if (!isRunning) { liftL = remoteVolumes.blue; liftR = remoteVolumes.red; }
                    else { if (isBallLeft) liftL = remoteVolumes.blue; else liftR = remoteVolumes.red; }
                } else {
                    liftL = liftR = (isRunning ? (isBallLeft ? localVolume : localVolume) : localVolume);
                }

                paddleL.vy -= liftL * config.liftPower;
                paddleR.vy -= liftR * config.liftPower;

                [paddleL, paddleR].forEach(p => {
                    p.vy += config.gravity; p.vy *= 0.9; p.y += p.vy;
                    if (p.y < 0) { p.y = 0; p.vy = 0; }
                    if (p.y > canvas.height - config.paddleHeight) { p.y = canvas.height - config.paddleHeight; p.vy = 0; }
                });

                if (isRunning) {
                    ball.x += ball.vx; ball.y += ball.vy;
                    if (ball.y < 0 || ball.y > canvas.height - config.ballSize) ball.vy *= -1;
                    if (ball.vx < 0 && ball.x < config.paddleWidth + 10 && ball.y > paddleL.y && ball.y < paddleL.y + config.paddleHeight) {
                        ball.vx = Math.abs(ball.vx) * config.ballAcceleration;
                        ball.vy += (ball.y - (paddleL.y + config.paddleHeight/2)) / (config.paddleHeight/2) * 1.5;
                        ball.x = config.paddleWidth + 10;
                    }
                    if (ball.vx > 0 && ball.x > canvas.width - config.paddleWidth - 10 - config.ballSize && ball.y > paddleR.y && ball.y < paddleR.y + config.paddleHeight) {
                        ball.vx = -Math.abs(ball.vx) * config.ballAcceleration;
                        ball.vy += (ball.y - (paddleR.y + config.paddleHeight/2)) / (config.paddleHeight/2) * 1.5;
                        ball.x = canvas.width - config.paddleWidth - 10 - config.ballSize;
                    }
                    if (ball.x < 0) { score.right++; scoreRightEl.innerText = score.right; showRoundStart(); }
                    else if (ball.x > canvas.width) { score.left++; scoreLeftEl.innerText = score.left; showRoundStart(); }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.setLineDash([10, 15]); ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
                const isBallLeft = ball.x < canvas.width / 2;
                ctx.fillStyle = (!isRunning || isBallLeft) ? config.colorLeft : '#1e3a8a';
                ctx.fillRect(10, paddleL.y, config.paddleWidth, config.paddleHeight);
                ctx.fillStyle = (!isRunning || !isBallLeft) ? config.colorRight : '#7f1d1d';
                ctx.fillRect(canvas.width - config.paddleWidth - 10, paddleR.y, config.paddleWidth, config.paddleHeight);
                ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc(ball.x, ball.y, config.ballSize, 0, Math.PI * 2); ctx.fill();
                requestAnimationFrame(() => { update(); draw(); });
            }

            function showRoundStart() { isRunning = false; resetPositions(); overlay.classList.remove('hidden'); }

            nextRoundBtn.addEventListener('click', () => {
                overlay.classList.add('hidden');
                let count = 3;
                const ctn = document.getElementById('countdown-container');
                const ctxText = document.getElementById('countdown-text');
                ctn.classList.remove('hidden');
                const timer = setInterval(() => {
                    if(count > 0) { ctxText.innerText = count; count--; }
                    else {
                        clearInterval(timer); ctxText.innerText = "GO !";
                        ball.vx = (Math.random() > 0.5 ? 1 : -1) * config.ballBaseSpeed;
                        ball.vy = (Math.random() - 0.5) * config.ballBaseSpeed;
                        isRunning = true;
                        setTimeout(() => { ctn.classList.add('hidden'); }, 800);
                    }
                }, 1000);
            });

            modeToggle.addEventListener('click', () => {
                controlMode = controlMode === 'remote' ? 'local' : 'remote';
                modeToggle.innerText = controlMode === 'remote' ? 'MODE : TÉLÉPHONES' : 'MODE : PC LOCAL';
                if (controlMode === 'local') { qrSection.classList.add('hidden'); controlGrid.classList.remove('md:grid-cols-2'); controlGrid.classList.add('flex', 'flex-col', 'items-center'); }
                else { qrSection.classList.remove('hidden'); controlGrid.classList.remove('flex', 'flex-col', 'items-center'); controlGrid.classList.add('md:grid-cols-2'); }
            });

            sensitivityRange.addEventListener('input', (e) => { config.liftPower = parseFloat(e.target.value); sensitivityValue.innerText = e.target.value; });
            document.getElementById('reset-btn').addEventListener('click', () => { score.left = score.right = 0; scoreLeftEl.innerText = scoreRightEl.innerText = 0; showRoundStart(); });
            document.getElementById('minus-left-btn').addEventListener('click', () => { if(score.left > 0) scoreLeftEl.innerText = --score.left; });
            document.getElementById('minus-right-btn').addEventListener('click', () => { if(score.right > 0) scoreRightEl.innerText = --score.right; });
            window.addEventListener('resize', resize);
            setupListeners(); resize(); draw();
            const baseUrl = window.location.href.split('?')[0];
            new window.QRCode(document.getElementById("qr-blue"), { width: 110, height: 110, text: baseUrl + "?role=blue" });
            new window.QRCode(document.getElementById("qr-red"), { width: 110, height: 110, text: baseUrl + "?role=red" });
        };

        const startApp = () => {
            if (role === 'host') { document.getElementById('host-view').classList.remove('hidden'); initHost(); }
            else { document.getElementById('controller-view').classList.remove('hidden'); initController(role); }
        };

        initAuth();
    </script>
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        canvas { background: #1e293b; border: 4px solid #334155; border-radius: 12px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .qr-card { background: white; padding: 8px; border-radius: 8px; color: black; }
        input[type=range] { accent-color: #3b82f6; cursor: pointer; height: 1.5rem; }
        #local-sens-range::-webkit-slider-thumb { width: 32px; height: 32px; border-radius: 50%; background: #3b82f6; -webkit-appearance: none; border: 4px solid white; }
    </style>
</head>
<body>

<div id="game-container" class="min-h-screen flex flex-col items-center justify-start p-4 pt-8">
    
    <!-- VUE HÔTE -->
    <div id="host-view" class="hidden flex flex-col items-center w-full max-w-5xl gap-4">
        <div class="w-full flex flex-col items-center gap-2">
            <h1 class="text-xl font-black text-slate-500 uppercase tracking-widest">Vocal Ping-Pong</h1>
            <div class="flex items-center gap-10 bg-slate-800/60 px-12 py-3 rounded-full border border-slate-700 shadow-xl">
                <div id="score-left" class="text-4xl text-blue-500 font-black">0</div>
                <div class="text-slate-600 text-2xl font-bold">—</div>
                <div id="score-right" class="text-4xl text-red-500 font-black">0</div>
            </div>
            <button id="mode-toggle" class="mt-2 bg-blue-600 px-6 py-2 rounded-full font-bold text-[10px] tracking-widest transition-all">MODE : TÉLÉPHONES</button>
        </div>

        <div class="relative w-full max-w-[800px] flex justify-center mt-2">
            <canvas id="pongCanvas"></canvas>
            <div id="overlay" class="absolute inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm rounded-xl">
                <button id="next-round-btn" class="bg-blue-600 hover:bg-blue-500 px-12 py-4 rounded-full font-black text-xl shadow-2xl border-b-4 border-blue-800 active:border-b-0">LANCER LA BALLE</button>
            </div>
            <div id="countdown-container" class="hidden absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                <div id="countdown-text" class="text-8xl font-black text-white drop-shadow-2xl">3</div>
            </div>
        </div>

        <div class="w-full max-w-[250px] h-1.5 bg-slate-800 rounded-full overflow-hidden mb-4"><div id="local-vocal-bar" class="h-full bg-green-500 transition-all duration-75" style="width: 0%"></div></div>

        <div id="control-grid" class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 max-w-[800px]">
            <div id="qr-section" class="bg-slate-800/30 p-5 rounded-3xl border border-slate-700/50 flex flex-col items-center gap-4">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Connecter manettes</h2>
                <div class="flex gap-10">
                    <div class="flex flex-col items-center gap-2"><div id="qr-blue" class="qr-card"></div><span class="text-[9px] text-blue-500 font-black uppercase">Bleue</span></div>
                    <div class="flex flex-col items-center gap-2"><div id="qr-red" class="qr-card"></div><span class="text-[9px] text-red-500 font-black uppercase">Rouge</span></div>
                </div>
            </div>
            <div class="flex flex-col gap-4">
                <div class="bg-slate-800/80 p-6 rounded-3xl border border-slate-700 shadow-xl flex flex-col justify-center">
                    <div class="flex justify-between items-center mb-4"><label class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Sensibilité Hôte</label><span id="sensitivity-value" class="text-blue-400 font-mono font-bold text-sm bg-blue-900/20 px-3 py-1 rounded-lg">1.2</span></div>
                    <input type="range" id="sensitivity-range" min="0.2" max="6.0" step="0.1" value="1.2" class="w-full appearance-none bg-slate-700 rounded-lg">
                </div>
                <div class="bg-slate-800/80 p-5 rounded-3xl border border-slate-700 shadow-xl flex flex-wrap gap-3 justify-center">
                    <button id="reset-btn" class="bg-slate-700 px-4 py-2 rounded-xl text-[9px] font-bold border border-slate-600 uppercase">Reset Match</button>
                    <button id="minus-left-btn" class="bg-blue-900/40 px-4 py-2 rounded-xl text-[9px] font-bold border border-blue-700 text-blue-300">-1 Bleu</button>
                    <button id="minus-right-btn" class="bg-red-900/40 px-4 py-2 rounded-xl text-[9px] font-bold border border-red-700 text-red-300">-1 Rouge</button>
                </div>
            </div>
        </div>
    </div>

    <!-- VUE MANETTE -->
    <div id="controller-view" class="hidden flex flex-col items-center text-center p-8 gap-6 w-full max-w-sm pt-8">
        <div class="flex justify-between w-full items-center">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">Manette</h1>
            <div id="network-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-lg"></div>
        </div>
        
        <div id="controller-status" class="w-full">
            <button id="start-mic-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white px-8 py-6 rounded-3xl font-black text-xl shadow-2xl border-b-4 border-blue-800 active:border-b-0">ACTIVER MANETTE</button>
        </div>
        
        <div class="w-full aspect-square bg-slate-800 rounded-[4rem] border-8 border-slate-700 flex items-end overflow-hidden p-6 shadow-2xl relative">
            <div id="volume-bar" class="w-full bg-gradient-to-t from-blue-600 to-cyan-400 rounded-[3rem] transition-all duration-75 shadow-[0_0_50px_rgba(59,130,246,0.3)]" style="height: 0%;"></div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none text-white/5 text-8xl font-black uppercase rotate-90">VOCAL</div>
        </div>

        <div class="w-full bg-slate-800/80 p-8 rounded-[2.5rem] border border-slate-700 shadow-xl flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <div class="flex flex-col items-start text-left"><label class="text-[11px] uppercase font-black text-slate-400 tracking-widest">Sensibilité Micro</label><span class="text-[9px] text-slate-500 font-bold uppercase">Plus haut = plus sensible</span></div>
                <span id="local-sens-value" class="text-blue-400 font-mono font-bold text-3xl">1.5</span>
            </div>
            <input type="range" id="local-sens-range" min="0.5" max="25.0" step="0.5" value="1.5" class="w-full appearance-none bg-slate-700 rounded-lg">
        </div>
    </div>

</div>

</body>
</html>
