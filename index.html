<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Ping-Pong - Multi-appareils</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de la bibliothèque QRCode -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaLj-265kyKSuMSzm34RpKqPw7NX8tuVw",
            authDomain: "vocal-ping-pong.firebaseapp.com",
            projectId: "vocal-ping-pong",
            storageBucket: "vocal-ping-pong.firebasestorage.app",
            messagingSenderId: "1073422582999",
            appId: "1:1073422582999:web:822acd6a8a1bffa10c5c92",
            measurementId: "G-R9XNF09NZ0"
        };

        const appId = "vocal-ping-pong"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let role = new URLSearchParams(window.location.search).get('role') || 'host';
        let remoteVolumes = { blue: 0, red: 0 };
        let localVolume = 0;
        let controlMode = 'remote'; 
        let unsubscribeListeners = [];

        const initAuth = async () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    startApp();
                } else {
                    signInAnonymously(auth).catch(e => console.error("Auth error:", e));
                }
            });
        };

        const initController = async (team) => {
            const statusText = document.getElementById('controller-status');
            const volumeBar = document.getElementById('volume-bar');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                statusText.innerText = `Équipe ${team === 'blue' ? 'Bleue' : 'Rouge'}`;
                
                setInterval(async () => {
                    if (!auth.currentUser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let average = sum / dataArray.length;
                    let norm = average / 128; 
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'paddle_volumes', team);
                        await setDoc(docRef, { volume: norm, lastUpdate: Date.now() }, { merge: true });
                    } catch (e) {}
                    volumeBar.style.height = Math.min(norm * 50, 100) + '%';
                }, 50);
            } catch (err) {
                statusText.innerText = "Erreur Micro : " + err.message;
            }
        };

        const initHost = () => {
            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            const scoreLeftEl = document.getElementById('score-left');
            const scoreRightEl = document.getElementById('score-right');
            const sensitivityRange = document.getElementById('sensitivity-range');
            const sensitivityValue = document.getElementById('sensitivity-value');
            const overlay = document.getElementById('overlay');
            const nextRoundBtn = document.getElementById('next-round-btn');
            const qrSection = document.getElementById('qr-section');
            const modeToggle = document.getElementById('mode-toggle');
            const localVolBar = document.getElementById('local-vocal-bar');
            const controlGrid = document.getElementById('control-grid');

            const config = {
                paddleWidth: 15, paddleHeight: 100, ballSize: 10,
                gravity: 0.8, liftPower: 1.2, maxSpeed: 8,
                ballBaseSpeed: 1.25, ballAcceleration: 1.02,
                colorLeft: '#3b82f6', colorRight: '#ef4444'
            };

            let score = { left: 0, right: 0 };
            let ball = { x: 0, y: 0, vx: 0, vy: 0 };
            let paddleL = { y: 0, vy: 0 };
            let paddleR = { y: 0, vy: 0 };
            let isRunning = false;
            let keys = {};
            let hostAnalyser = null;
            let hostDataArray = null;

            const initLocalMic = async () => {
                if (hostAnalyser) return;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(stream);
                    hostAnalyser = audioContext.createAnalyser();
                    hostAnalyser.fftSize = 256;
                    source.connect(hostAnalyser);
                    hostDataArray = new Uint8Array(hostAnalyser.frequencyBinCount);
                } catch (e) { console.warn("Mic error"); }
            };

            const setupListeners = () => {
                if (!auth.currentUser) return;
                unsubscribeListeners.forEach(unsub => unsub());
                unsubscribeListeners = [];

                ['blue', 'red'].forEach(team => {
                    const unsub = onSnapshot(
                        doc(db, 'artifacts', appId, 'public', 'data', 'paddle_volumes', team),
                        (d) => { if(d.exists()) remoteVolumes[team] = d.data().volume; },
                        (err) => console.warn("Snapshot error", err)
                    );
                    unsubscribeListeners.push(unsub);
                });
            };

            setupListeners();

            // Fonction de redimensionnement définie localement
            function resize() {
                const containerWidth = Math.min(window.innerWidth * 0.9, 800);
                canvas.width = containerWidth;
                // Fixation d'une hauteur minimale pour éviter l'écrasement du terrain
                canvas.height = Math.max(320, Math.min(window.innerHeight * 0.45, 450));
                resetPositions();
            }

            function resetPositions() {
                ball.x = canvas.width / 2; 
                ball.y = canvas.height / 2;
                ball.vx = 0; ball.vy = 0;
                paddleL.y = canvas.height / 2 - config.paddleHeight / 2;
                paddleR.y = canvas.height / 2 - config.paddleHeight / 2;
                paddleL.vy = paddleR.vy = 0;
            }

            function update() {
                if (controlMode === 'local' && hostAnalyser) {
                    hostAnalyser.getByteFrequencyData(hostDataArray);
                    let sum = 0;
                    for (let i = 0; i < hostDataArray.length; i++) sum += hostDataArray[i];
                    localVolume = (sum / hostDataArray.length) / 128;
                    localVolBar.style.width = Math.min(localVolume * 50, 100) + '%';
                }

                const isBallLeft = ball.x < canvas.width / 2;
                let liftL = 0, liftR = 0;
                if (controlMode === 'remote') {
                    if (!isRunning) { liftL = remoteVolumes.blue; liftR = remoteVolumes.red; }
                    else { if (isBallLeft) liftL = remoteVolumes.blue; else liftR = remoteVolumes.red; }
                } else {
                    if (!isRunning) { liftL = liftR = localVolume; }
                    else { if (isBallLeft) liftL = localVolume; else liftR = localVolume; }
                }

                paddleL.vy -= liftL * config.liftPower;
                paddleR.vy -= liftR * config.liftPower;

                if (keys['KeyW']) paddleL.vy -= 1.2;
                if (keys['KeyS']) paddleL.vy += 1.2;
                if (keys['ArrowUp']) paddleR.vy -= 1.2;
                if (keys['ArrowDown']) paddleR.vy += 1.2;

                [paddleL, paddleR].forEach(p => {
                    p.vy += config.gravity; p.vy *= 0.92; p.y += p.vy;
                    if (p.y < 0) { p.y = 0; p.vy = 0; }
                    if (p.y > canvas.height - config.paddleHeight) { p.y = canvas.height - config.paddleHeight; p.vy = 0; }
                });

                if (isRunning) {
                    ball.x += ball.vx; ball.y += ball.vy;
                    if (ball.y < 0 || ball.y > canvas.height - config.ballSize) ball.vy *= -1;
                    if (ball.vx < 0 && ball.x < config.paddleWidth + 10 && ball.y > paddleL.y && ball.y < paddleL.y + config.paddleHeight) {
                        ball.vx = Math.abs(ball.vx) * config.ballAcceleration;
                        ball.vy += (ball.y - (paddleL.y + config.paddleHeight/2)) / (config.paddleHeight/2) * 1.5;
                        ball.x = config.paddleWidth + 10;
                    }
                    if (ball.vx > 0 && ball.x > canvas.width - config.paddleWidth - 10 - config.ballSize && ball.y > paddleR.y && ball.y < paddleR.y + config.paddleHeight) {
                        ball.vx = -Math.abs(ball.vx) * config.ballAcceleration;
                        ball.vy += (ball.y - (paddleR.y + config.paddleHeight/2)) / (config.paddleHeight/2) * 1.5;
                        ball.x = canvas.width - config.paddleWidth - 10 - config.ballSize;
                    }
                    if (ball.x < 0) { score.right++; scoreRightEl.innerText = score.right; showRoundStart(); }
                    else if (ball.x > canvas.width) { score.left++; scoreLeftEl.innerText = score.left; showRoundStart(); }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.setLineDash([10, 15]); ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke(); ctx.setLineDash([]);

                const isBallLeft = ball.x < canvas.width / 2;
                ctx.fillStyle = (!isRunning || isBallLeft) ? config.colorLeft : '#1e3a8a';
                ctx.fillRect(10, paddleL.y, config.paddleWidth, config.paddleHeight);
                ctx.fillStyle = (!isRunning || !isBallLeft) ? config.colorRight : '#7f1d1d';
                ctx.fillRect(canvas.width - config.paddleWidth - 10, paddleR.y, config.paddleWidth, config.paddleHeight);

                ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc(ball.x, ball.y, config.ballSize, 0, Math.PI * 2); ctx.fill();
                requestAnimationFrame(() => { update(); draw(); });
            }

            function showRoundStart() { 
                isRunning = false; resetPositions(); overlay.classList.remove('hidden'); 
            }

            nextRoundBtn.addEventListener('click', () => {
                overlay.classList.add('hidden');
                let count = 3;
                const ctn = document.getElementById('countdown-container');
                const ctxText = document.getElementById('countdown-text');
                ctn.classList.remove('hidden'); ctxText.style.opacity = 1;
                const timer = setInterval(() => {
                    if(count > 0) { ctxText.innerText = count; count--; }
                    else {
                        clearInterval(timer); ctxText.innerText = "GO !";
                        ball.vx = (Math.random() > 0.5 ? 1 : -1) * config.ballBaseSpeed;
                        ball.vy = (Math.random() - 0.5) * config.ballBaseSpeed;
                        isRunning = true;
                        setTimeout(() => { ctn.classList.add('hidden'); }, 800);
                    }
                }, 1000);
            });

            modeToggle.addEventListener('click', () => {
                controlMode = controlMode === 'remote' ? 'local' : 'remote';
                modeToggle.innerText = controlMode === 'remote' ? 'MODE : TÉLÉPHONES' : 'MODE : PC LOCAL';
                if (controlMode === 'local') {
                    qrSection.classList.add('hidden');
                    controlGrid.classList.remove('md:grid-cols-2');
                    controlGrid.classList.add('flex', 'flex-col', 'items-center');
                    initLocalMic();
                } else {
                    qrSection.classList.remove('hidden');
                    controlGrid.classList.remove('flex', 'flex-col', 'items-center');
                    controlGrid.classList.add('md:grid-cols-2');
                }
            });

            sensitivityRange.addEventListener('input', (e) => {
                config.liftPower = parseFloat(e.target.value);
                sensitivityValue.innerText = e.target.value;
            });
            
            document.getElementById('reset-btn').addEventListener('click', () => { score.left = 0; score.right = 0; scoreLeftEl.innerText = 0; scoreRightEl.innerText = 0; showRoundStart(); });
            document.getElementById('minus-left-btn').addEventListener('click', () => { if(score.left > 0) scoreLeftEl.innerText = --score.left; });
            document.getElementById('minus-right-btn').addEventListener('click', () => { if(score.right > 0) scoreRightEl.innerText = --score.right; });
            
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            // Gestionnaire de redimensionnement attaché à l'intérieur de initHost
            window.addEventListener('resize', resize);
            
            resize(); draw();
            const baseUrl = window.location.href.split('?')[0];
            new window.QRCode(document.getElementById("qr-blue"), { width: 100, height: 100, text: baseUrl + "?role=blue" });
            new window.QRCode(document.getElementById("qr-red"), { width: 100, height: 100, text: baseUrl + "?role=red" });
        };

        const startApp = () => {
            if (role === 'host') {
                document.getElementById('host-view').classList.remove('hidden');
                initHost();
            } else {
                document.getElementById('controller-view').classList.remove('hidden');
                initController(role);
            }
        };

        initAuth();
    </script>
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { background: #1e293b; border: 4px solid #334155; border-radius: 12px; display: block; margin: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .qr-card { background: white; padding: 10px; border-radius: 12px; color: black; display: flex; justify-content: center; }
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body>

<div id="game-container" class="min-h-screen flex flex-col items-center justify-start p-4 md:p-6">
    
    <div id="host-view" class="hidden flex flex-col items-center w-full max-w-5xl gap-4">
        
        <!-- Header -->
        <div class="w-full flex flex-col items-center gap-2">
            <h1 class="text-xl font-black tracking-widest text-slate-500 uppercase">Vocal Ping-Pong</h1>
            <div class="flex items-center gap-8 bg-slate-800/60 px-8 py-2 rounded-3xl border border-slate-700 shadow-xl">
                <div id="score-left" class="text-4xl text-blue-500 font-black">0</div>
                <div class="text-slate-600 text-2xl font-bold">—</div>
                <div id="score-right" class="text-4xl text-red-500 font-black">0</div>
            </div>
            <button id="mode-toggle" class="mt-2 bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold text-[10px] tracking-widest transition-all">
                MODE : TÉLÉPHONES
            </button>
        </div>

        <!-- Zone de Jeu -->
        <div class="relative w-full max-w-[800px] flex justify-center">
            <canvas id="pongCanvas"></canvas>
            
            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm rounded-xl">
                <div class="text-center p-6 flex flex-col items-center gap-4">
                    <button id="next-round-btn" class="bg-blue-600 hover:bg-blue-500 px-10 py-3.5 rounded-full font-black text-lg shadow-2xl transition-all transform hover:scale-105 active:scale-95 border-b-4 border-blue-800">
                        LANCER LA BALLE
                    </button>
                    <div class="text-[10px] text-blue-400 font-bold uppercase tracking-widest opacity-70">Ajustez vos micros avant de commencer</div>
                </div>
            </div>
            
            <div id="countdown-container" class="hidden absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                <div id="countdown-text" class="text-7xl font-black text-white drop-shadow-2xl">3</div>
            </div>
        </div>

        <!-- Volume PC Feedback -->
        <div class="w-full max-w-[250px] h-1.5 bg-slate-800 rounded-full overflow-hidden shadow-inner">
            <div id="local-vocal-bar" class="h-full bg-green-500 transition-all duration-75" style="width: 0%"></div>
        </div>

        <!-- Grille de contrôle -->
        <div id="control-grid" class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 items-stretch max-w-[800px]">
            
            <!-- Connexion Manettes -->
            <div id="qr-section" class="bg-slate-800/30 p-4 rounded-3xl border border-slate-700/50 flex flex-col items-center gap-4">
                <h2 class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Scanner pour connecter</h2>
                <div class="flex gap-6">
                    <div class="flex flex-col items-center gap-2">
                        <div id="qr-blue" class="qr-card shadow-lg"></div>
                        <span class="text-[9px] text-blue-500 font-black uppercase">Bleue</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div id="qr-red" class="qr-card shadow-lg"></div>
                        <span class="text-[9px] text-red-500 font-black uppercase">Rouge</span>
                    </div>
                </div>
            </div>

            <!-- Réglages & Gestion Score -->
            <div class="flex flex-col gap-4">
                <div id="sensitivity-module" class="bg-slate-800/80 p-5 rounded-3xl border border-slate-700 shadow-xl flex-1 flex flex-col justify-center">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[9px] uppercase font-black text-slate-400 tracking-widest">Sensibilité Micro</label>
                        <span id="sensitivity-value" class="text-blue-400 font-mono font-bold text-sm bg-blue-900/20 px-2 py-0.5 rounded-lg">1.2</span>
                    </div>
                    <input type="range" id="sensitivity-range" min="0.2" max="6.0" step="0.1" value="1.2" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <div id="score-module" class="bg-slate-800/80 p-4 rounded-3xl border border-slate-700 shadow-xl">
                    <div class="flex flex-wrap gap-2 justify-center">
                        <button id="reset-btn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-[9px] font-bold border border-slate-600 uppercase transition-all">Reset Match</button>
                        <button id="minus-left-btn" class="bg-blue-900/40 hover:bg-blue-800/40 px-3 py-2 rounded-xl text-[9px] font-bold border border-blue-700 text-blue-300 transition-all">-1 Bleu</button>
                        <button id="minus-right-btn" class="bg-red-900/40 hover:bg-red-800/40 px-3 py-2 rounded-xl text-[9px] font-bold border border-red-700 text-red-300 transition-all">-1 Rouge</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- VUE MANETTE -->
    <div id="controller-view" class="hidden flex flex-col items-center text-center p-8 gap-8 w-full max-w-sm pt-20">
        <h1 class="text-4xl font-black italic text-white uppercase tracking-tighter">Manette</h1>
        <div id="controller-status" class="text-slate-400 font-bold bg-slate-800 px-6 py-2 rounded-full border border-slate-700">Initialisation...</div>
        
        <div class="w-full aspect-square bg-slate-800 rounded-[4rem] border-8 border-slate-700 flex items-end overflow-hidden p-6 shadow-2xl relative">
            <div id="volume-bar" class="w-full bg-gradient-to-t from-green-600 to-green-400 rounded-[3rem] transition-all duration-75 shadow-[0_0_50px_rgba(34,197,94,0.3)]" style="height: 0%; width: 100%;"></div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span class="text-white/10 text-8xl font-black uppercase rotate-90">VOCAL</span>
            </div>
        </div>
        <p class="text-slate-400 font-medium">Criez pour faire <span class="text-green-400 font-black">monter</span> votre raquette !</p>
        <button onclick="location.reload()" class="bg-slate-700 px-10 py-4 rounded-full text-xs font-black uppercase tracking-widest border border-slate-600">Actualiser</button>
    </div>

</div>

</body>
</html>
